name: Build and Push Docker Image

on:
  push:
    branches:
      - main  # build on main branch

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v3

      - name: Log in to Docker Hub
        uses: docker/login-action@v2
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Set image tag
        run: echo "IMAGE_TAG=${GITHUB_SHA::7}" >> $GITHUB_ENV

      - name: Build Docker image
        run: |
          docker build \
            -t ${{ secrets.DOCKERHUB_USERNAME }}/ipp-eisr_portal:${IMAGE_TAG} \
            .

      - name: Push Docker image
        run: |
          docker push ${{ secrets.DOCKERHUB_USERNAME }}/ipp-eisr_portal:${IMAGE_TAG}

      - name: Update latest tag
        run: |
          docker tag ${{ secrets.DOCKERHUB_USERNAME }}/ipp-eisr_portal:${IMAGE_TAG} ${{ secrets.DOCKERHUB_USERNAME }}/ipp-eisr_portal:latest
          docker push ${{ secrets.DOCKERHUB_USERNAME }}/ipp-eisr_portal:latest
