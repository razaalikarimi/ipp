name: Build and Push Docker Image

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v3

      - name: Log in to Docker Hub
        uses: docker/login-action@v2
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Get next image version
        id: version
        run: |
          HUB_USER=${{ secrets.DOCKERHUB_USERNAME }}
          REPO=ipp-eisr_portal

          # Get all tags from Docker Hub API
          TAGS=$(curl -s "https://hub.docker.com/v2/repositories/${HUB_USER}/${REPO}/tags?page_size=100" | jq -r '.results[].name' | grep '^v[0-9]\+' || true)

          if [ -z "$TAGS" ]; then
            NEXT_VERSION=1
          else
            # Extract numbers and find max
            MAX=$(echo "$TAGS" | sed 's/v//' | sort -n | tail -1)
            NEXT_VERSION=$((MAX + 1))
          fi

          echo "IMAGE_TAG=v${NEXT_VERSION}"
          echo "IMAGE_TAG=v${NEXT_VERSION}" >> $GITHUB_ENV

      - name: Build Docker image
        run: |
          docker build \
            -t ${{ secrets.DOCKERHUB_USERNAME }}/ipp-eisr_portal:${IMAGE_TAG} \
            .

      - name: Push Docker image
        run: |
          docker push ${{ secrets.DOCKERHUB_USERNAME }}/ipp-eisr_portal:${IMAGE_TAG}

      - name: Update latest tag
        run: |
          docker tag ${{ secrets.DOCKERHUB_USERNAME }}/ipp-eisr_portal:${IMAGE_TAG} ${{ secrets.DOCKERHUB_USERNAME }}/ipp-eisr_portal:latest
          docker push ${{ secrets.DOCKERHUB_USERNAME }}/ipp-eisr_portal:latest
